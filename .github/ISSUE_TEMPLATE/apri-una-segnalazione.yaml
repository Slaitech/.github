name: Apri una segnalazione
description: Per segnalare bug, aprire una discussione o inviare un contributo
title: "[Segnalazione]: "
labels: []
body:
  - type: checkboxes
    id: duplicate_check
    attributes:
      label: Esiste già una discussione sul tema che ti interessa, o su un tema simile?
      description: |
        Verifica nella lista delle discussioni del repository. Se esiste, vai alla discussione esistente e partecipa lasciando un commento.
      options:
        - label: Ho verificato e non esiste
          required: true

  - type: markdown
    attributes:
      value: "-------"

  - type: textarea
    id: cosa
    attributes:
      label: Cosa
      description: |
        Descrivi in modo chiaro e conciso il tema della tua segnalazione indicando il link della pagina o delle pagine interessate.

        Per segnalare un bug indica come riprodurlo per passi: es. (1) Vai a '...'; (2) Fai click su '...'; (3) Ora trovi il bug '...'.
        Per proporre un contributo descrivi la soluzione che immagini, cosa ti aspetti e le eventuali alternative che hai già valutato.

        Puoi anche aggiungere catture di schermo per arricchire la segnalazione.
        Assicurati di non condividere informazioni personali.
    validations:
      required: true

  - type: textarea
    id: perche
    attributes:
      label: Perché
      description: |
        Spiega perché ritieni rilevante la segnalazione.

        Indica analisi, verifiche e test svolti a supporto, se disponibili.
    validations:
      required: true

  - type: textarea
    id: contesto
    attributes:
      label: Contesto
      description: |
        Se significative, inserisci informazioni su tipo di dispositivo, sistema operativo e browser.
    validations:
      required: false

  - type: textarea
    id: altro
    attributes:
      label: Altro
      description: |
        Inserisci link a esempi, ricerca, design o codice a corredo della segnalazione, se disponibili.
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        -------
